<!DOCTYPE html>
<html lang="en">

<head>
        <meta charset="UTF-8">
        <meta http-equiv="X-UA-Compatible" content="IE=edge">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>AutoFill</title>


        <link rel="preconnect" href="https://fonts.gstatic.com">
        <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@300&display=swap" rel="stylesheet">
        <link href="stylesheet.css" rel="stylesheet">


</head>

<body>
        <div class="headerrow">
                <img src="icon.png" alt="logo" class="logo">
                <h1>QuickFill</h1>

        </div>
        <div class="inputrow">
                <input type="text" id="inp_key" placeholder="KEY">
                <input type="text" id="inp_val" placeholder="VALUE">
                <button type="text" class="addBtn">ADD</button>

        </div>
        <div class="tablistcont">

                <table id="tablist">
                        <tr class="firstLine">
                                <th class="header_key">KEY</th>
                                <th class="header_val">VALUE</th>
                        </tr>

                </table>
        </div>


</body>
<script src="https://ajax.googleapis.com/ajax/libs/jquery/3.6.1/jquery.min.js"></script>

<script src="popup.js"></script>

</html>
